<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserVault — MongoDB Dashboard</title>
    <meta name="description" content="A modern MongoDB user management dashboard with full CRUD operations">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ──────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0a12;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(139, 92, 246, 0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #8b8b9e;
            --text-muted: #55556a;
            --accent-1: #8b5cf6;
            --accent-2: #06b6d4;
            --accent-3: #f43f5e;
            --accent-4: #10b981;
            --gradient-1: linear-gradient(135deg, #8b5cf6, #06b6d4);
            --gradient-2: linear-gradient(135deg, #f43f5e, #f97316);
            --gradient-3: linear-gradient(135deg, #10b981, #06b6d4);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ─── Abstract Animated Background ──────────────── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            top: 50%; right: -8%;
            animation-delay: -7s;
            animation-duration: 25s;
        }
        .orb-3 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #f43f5e, transparent 70%);
            bottom: -5%; left: 30%;
            animation-delay: -14s;
            animation-duration: 22s;
        }
        .orb-4 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, #10b981, transparent 70%);
            top: 30%; left: 50%;
            animation-delay: -4s;
            animation-duration: 18s;
            opacity: 0.2;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* ─── Layout ────────────────────────────────────── */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ─── Header ────────────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .header-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-4);
            animation: pulse 2s ease-in-out infinite;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1.15;
            animation: fadeInDown 0.8s ease 0.1s both;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 12px;
            font-weight: 300;
            animation: fadeInDown 0.8s ease 0.2s both;
        }

        /* ─── Stats Bar ─────────────────────────────────── */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            padding: 20px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-accent);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-value.purple { color: var(--accent-1); }
        .stat-value.cyan { color: var(--accent-2); }
        .stat-value.rose { color: var(--accent-3); }
        .stat-value.emerald { color: var(--accent-4); }

        /* ─── Main Grid ─────────────────────────────────── */
        .main-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        @media (max-width: 860px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        /* ─── Glass Panel ───────────────────────────────── */
        .panel {
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title .icon {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
        }

        .panel-title .icon.purple { background: rgba(139,92,246,0.15); }
        .panel-title .icon.cyan { background: rgba(6,182,212,0.15); }

        .panel-body { padding: 24px; }

        /* ─── Form ──────────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
            background: rgba(255,255,255,0.05);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
            width: 100%;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(139,92,246,0.45);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .form-status {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .form-status.success {
            display: block;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.25);
            color: var(--accent-4);
        }

        .form-status.error {
            display: block;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.25);
            color: var(--accent-3);
        }

        /* ─── Search Bar ────────────────────────────────── */
        .search-bar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        .search-bar input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.12);
        }

        .search-bar .btn-search {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(6,182,212,0.1);
            color: var(--accent-2);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .search-bar .btn-search:hover {
            background: rgba(6,182,212,0.2);
        }

        /* ─── User List ─────────────────────────────────── */
        .user-list {
            max-height: 620px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }

        .user-list::-webkit-scrollbar { width: 5px; }
        .user-list::-webkit-scrollbar-track { background: transparent; }
        .user-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .user-card {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
            cursor: default;
        }

        .user-card:last-child { border-bottom: none; }

        .user-card:hover {
            background: var(--bg-card-hover);
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-avatar {
            width: 42px; height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-age-badge {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(139,92,246,0.12);
            color: var(--accent-1);
            flex-shrink: 0;
        }

        /* ─── User Details ───────────────────────────────── */
        .user-details {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.04);
        }

        .detail-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.8rem;
        }

        .detail-row + .detail-row {
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            min-width: 72px;
            flex-shrink: 0;
        }

        .detail-value {
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex: 1;
            word-break: break-word;
        }

        .hobby-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .hobby-tag {
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.68rem;
            font-weight: 500;
            background: rgba(6,182,212,0.1);
            color: var(--accent-2);
            border: 1px solid rgba(6,182,212,0.15);
        }

        .detail-bio {
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-style: italic;
            line-height: 1.5;
        }

        .detail-meta {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .user-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .btn-icon.edit:hover {
            background: rgba(6,182,212,0.12);
            color: var(--accent-2);
            border-color: rgba(6,182,212,0.2);
        }

        .btn-icon.delete:hover {
            background: rgba(244,63,94,0.12);
            color: var(--accent-3);
            border-color: rgba(244,63,94,0.2);
        }

        .empty-state {
            padding: 60px 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* ─── Modal ─────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: #14141f;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 90%;
            max-width: 440px;
            padding: 32px;
            transform: translateY(20px) scale(0.97);
            transition: var(--transition);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal .btn-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* ─── Toast ─────────────────────────────────────── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            font-weight: 500;
            backdrop-filter: blur(20px);
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards;
            box-shadow: var(--shadow);
        }

        .toast.success {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: var(--accent-4);
        }

        .toast.error {
            background: rgba(244,63,94,0.15);
            border: 1px solid rgba(244,63,94,0.3);
            color: var(--accent-3);
        }

        .toast.info {
            background: rgba(6,182,212,0.15);
            border: 1px solid rgba(6,182,212,0.3);
            color: var(--accent-2);
        }

        /* ─── Animations ────────────────────────────────── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(30px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        /* ─── Responsive ────────────────────────────────── */
        @media (max-width: 600px) {
            .stats-bar { gap: 10px; }
            .stat-card { padding: 14px 16px; min-width: 100px; }
            .stat-value { font-size: 1.4rem; }
            .form-row { grid-template-columns: 1fr; }
            .user-actions { display: none; }
            .app { padding: 24px 16px 40px; }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- App -->
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-badge">
                <span class="dot"></span>
                Connected to MongoDB Atlas
            </div>
            <h1>UserVault</h1>
            <p>Full-stack MongoDB dashboard — Create, Read, Update & Delete</p>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value purple" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Age</div>
                <div class="stat-value cyan" id="statAvgAge">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Newest User</div>
                <div class="stat-value rose" id="statNewest">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">API Status</div>
                <div class="stat-value emerald" id="statApi">●</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">

            <!-- LEFT: Add User Form -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="icon purple">＋</span>
                        <span id="formTitle">Add New User</span>
                    </div>
                </div>
                <div class="panel-body">
                    <form id="userForm" autocomplete="off">
                        <input type="hidden" id="editId">

                        <div class="form-group">
                            <label for="inputName">Full Name</label>
                            <input type="text" id="inputName" placeholder="e.g. Alice Johnson" required>
                        </div>

                        <div class="form-group">
                            <label for="inputEmail">Email Address</label>
                            <input type="email" id="inputEmail" placeholder="e.g. alice@example.com" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="inputAge">Age</label>
                                <input type="number" id="inputAge" placeholder="28" min="0" max="120">
                            </div>
                            <div class="form-group">
                                <label for="inputUserId">User ID</label>
                                <input type="text" id="inputUserId" placeholder="USR001">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="inputHobbies">Hobbies</label>
                            <input type="text" id="inputHobbies" placeholder="reading, swimming, gaming">
                        </div>

                        <div class="form-group">
                            <label for="inputBio">Bio</label>
                            <input type="text" id="inputBio" placeholder="A short description...">
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" id="btnSubmit">
                                Add User
                            </button>
                            <button type="button" class="btn btn-secondary" id="btnCancel" onclick="resetForm()">
                                Clear
                            </button>
                        </div>

                        <div class="form-status" id="formStatus"></div>
                    </form>
                </div>
            </div>

            <!-- RIGHT: User List -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="icon cyan">☰</span>
                        User Directory
                    </div>
                    <button class="btn-search" onclick="loadUsers()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:rgba(6,182,212,0.1);color:var(--accent-2);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">
                        ↻ Refresh
                    </button>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by name..." oninput="handleSearch()">
                    <button class="btn-search" onclick="handleSearch()">Search</button>
                </div>

                <div class="user-list" id="userList">
                    <div class="empty-state">
                        <div class="empty-icon">◇</div>
                        <p>Loading users...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>✎ Edit User</h2>
            <form id="editForm" autocomplete="off">
                <input type="hidden" id="modalEditId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="modalName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="modalEmail" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="modalAge" min="0" max="120">
                    </div>
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="modalUserId">
                    </div>
                </div>
                <div class="form-group">
                    <label>Hobbies</label>
                    <input type="text" id="modalHobbies">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <input type="text" id="modalBio">
                </div>
                <div class="btn-group" style="margin-top:16px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toasts -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const API = '';

        // ─── Avatar Colors ─────────────────────────────────
        const avatarGradients = [
            'linear-gradient(135deg, #8b5cf6, #6d28d9)',
            'linear-gradient(135deg, #06b6d4, #0891b2)',
            'linear-gradient(135deg, #f43f5e, #e11d48)',
            'linear-gradient(135deg, #10b981, #059669)',
            'linear-gradient(135deg, #f97316, #ea580c)',
            'linear-gradient(135deg, #8b5cf6, #ec4899)',
            'linear-gradient(135deg, #14b8a6, #0891b2)',
        ];

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }

        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarGradients[Math.abs(hash) % avatarGradients.length];
        }

        // ─── Toast ──────────────────────────────────────────
        function showToast(message, type = 'success') {
            const container = document.getElementById('toasts');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ─── Load Users ─────────────────────────────────────
        async function loadUsers(query = '') {
            const listEl = document.getElementById('userList');
            listEl.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner"></div></div>';

            try {
                const url = query
                    ? `${API}/users/search?name=${encodeURIComponent(query)}`
                    : `${API}/users`;
                const res = await fetch(url);
                const users = await res.json();
                renderUsers(users);
                updateStats(users);
            } catch (err) {
                listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><p>Failed to load users</p></div>';
            }
        }

        function renderUsers(users) {
            const listEl = document.getElementById('userList');

            if (!users.length) {
                listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">◇</div><p>No users found. Add one to get started.</p></div>';
                return;
            }

            listEl.innerHTML = users.map(u => {
                const hobbiesHtml = (u.hobbies && u.hobbies.length)
                    ? u.hobbies.map(h => `<span class="hobby-tag">${escapeHtml(h)}</span>`).join('')
                    : '<span class="detail-meta">None</span>';

                const createdDate = u.createdAt
                    ? new Date(u.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : '—';

                return `
                <div class="user-card">
                    <div class="user-card-header">
                        <div class="user-avatar" style="background:${getAvatarColor(u.name)}">
                            ${getInitials(u.name)}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(u.name)}</div>
                            <div class="user-email">${escapeHtml(u.email)}</div>
                        </div>
                        ${u.age ? `<span class="user-age-badge">${u.age} yrs</span>` : ''}
                        <div class="user-actions">
                            <button class="btn-icon edit" onclick='openEditModal(${JSON.stringify(u)})' title="Edit">✎</button>
                            <button class="btn-icon delete" onclick="deleteUser('${u._id}')" title="Delete">✕</button>
                        </div>
                    </div>
                    <div class="user-details">
                        <div class="detail-row">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value">${u.userId ? escapeHtml(u.userId) : '<span class="detail-meta">—</span>'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Age</span>
                            <span class="detail-value">${u.age ? u.age + ' years' : '<span class="detail-meta">—</span>'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Hobbies</span>
                            <span class="detail-value"><span class="hobby-tags">${hobbiesHtml}</span></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Bio</span>
                            <span class="detail-value">${u.bio ? '<span class="detail-bio">' + escapeHtml(u.bio) + '</span>' : '<span class="detail-meta">—</span>'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Created</span>
                            <span class="detail-value detail-meta">${createdDate}</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function updateStats(users) {
            document.getElementById('statTotal').textContent = users.length;

            const ages = users.filter(u => u.age).map(u => u.age);
            const avg = ages.length ? Math.round(ages.reduce((a, b) => a + b, 0) / ages.length) : '—';
            document.getElementById('statAvgAge').textContent = avg;

            if (users.length) {
                const newest = users.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                document.getElementById('statNewest').textContent = newest.name.split(' ')[0];
            } else {
                document.getElementById('statNewest').textContent = '—';
            }
        }

        // ─── Search ─────────────────────────────────────────
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchInput').value.trim();
            searchTimeout = setTimeout(() => loadUsers(query), 300);
        }

        // ─── Add User ───────────────────────────────────────
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('formStatus');

            const data = {
                name: document.getElementById('inputName').value.trim(),
                email: document.getElementById('inputEmail').value.trim(),
                age: parseInt(document.getElementById('inputAge').value) || undefined,
                hobbies: document.getElementById('inputHobbies').value.split(',').map(s => s.trim()).filter(Boolean),
                bio: document.getElementById('inputBio').value.trim() || undefined,
                userId: document.getElementById('inputUserId').value.trim() || undefined
            };

            try {
                const res = await fetch(`${API}/addUser`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    showToast(`${data.name} added successfully`);
                    resetForm();
                    loadUsers();
                } else {
                    showToast(result.error || result.message, 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        });

        function resetForm() {
            document.getElementById('userForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Add New User';
            document.getElementById('btnSubmit').textContent = 'Add User';
            document.getElementById('formStatus').className = 'form-status';
            document.getElementById('formStatus').style.display = 'none';
        }

        // ─── Edit Modal ─────────────────────────────────────
        function openEditModal(user) {
            document.getElementById('modalEditId').value = user._id;
            document.getElementById('modalName').value = user.name || '';
            document.getElementById('modalEmail').value = user.email || '';
            document.getElementById('modalAge').value = user.age || '';
            document.getElementById('modalUserId').value = user.userId || '';
            document.getElementById('modalHobbies').value = (user.hobbies || []).join(', ');
            document.getElementById('modalBio').value = user.bio || '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('modalEditId').value;
            const data = {
                name: document.getElementById('modalName').value.trim(),
                email: document.getElementById('modalEmail').value.trim(),
                age: parseInt(document.getElementById('modalAge').value) || undefined,
                hobbies: document.getElementById('modalHobbies').value.split(',').map(s => s.trim()).filter(Boolean),
                bio: document.getElementById('modalBio').value.trim() || undefined,
                userId: document.getElementById('modalUserId').value.trim() || undefined
            };

            try {
                const res = await fetch(`${API}/updateUser/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast('User updated successfully');
                    closeModal();
                    loadUsers();
                } else {
                    const result = await res.json();
                    showToast(result.error || 'Update failed', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        });

        // ─── Delete User ────────────────────────────────────
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;

            try {
                const res = await fetch(`${API}/deleteUser/${id}`, { method: 'DELETE' });

                if (res.ok) {
                    showToast('User deleted', 'info');
                    loadUsers();
                } else {
                    showToast('Delete failed', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        }

        // ─── Utility ────────────────────────────────────────
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Init ───────────────────────────────────────────
        loadUsers();
    </script>
</body>
</html>
